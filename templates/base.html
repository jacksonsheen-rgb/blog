<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{base_url}}/static/css/style.css">
</head>
<body class="{{body_class}}">

  <header class="site-header">
    <div class="header-inner">
      <a href="{{base_url}}/" class="site-logo">I came up here to freeze</a>
      <nav class="site-nav">
        <a href="{{base_url}}/">Journal</a>
        <a href="{{base_url}}/#archive">Archive</a>
      </nav>
    </div>
  </header>

  <main>
    {{content}}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">I came up here to freeze</span>
        <p class="footer-tagline">Words, images, and everything in between.</p>
      </div>
      <div class="footer-right">
        <p>&copy; 2026</p>
      </div>
    </div>
  </footer>

  <script src="{{base_url}}/static/js/main.js"></script>
</body>
</html>
