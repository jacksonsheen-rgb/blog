<section class="hero">
  <div class="hero-inner">
    <h1 class="hero-title">I came up here to freeze</h1>
    <p class="hero-subtitle">A journal of thoughts, observations, and works in progress.</p>
  </div>
</section>

<section class="latest-post" id="latest">
  <div class="section-inner">
    <div class="section-label">Latest</div>
  </div>
</section>

<section class="archive" id="archive">
  <div class="section-inner">
    <div class="archive-header">
      <div class="section-label">Archive</div>
      <div class="sort-controls">
        <button class="sort-btn active" data-sort="recent">Recent</button>
        <span class="sort-divider">/</span>
        <button class="sort-btn" data-sort="popular">Popular</button>
      </div>
    </div>
    <div class="posts-grid" id="posts-grid">
      {{#each posts}}
      <article class="post-card" data-slug="{{slug}}" data-date="{{date_str}}">
        <a href="{{base_url}}/{{slug}}/" class="post-card-link">
          <div class="post-card-meta">
            <time>{{date_str}}</time>
            <div class="post-card-tags">{{tags_html}}</div>
          </div>
          <h2 class="post-card-title">{{title}}</h2>
          <p class="post-card-desc">{{description}}</p>
        </a>
      </article>
      {{/each}}
    </div>
  </div>
</section>
